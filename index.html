<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Välkommen till min sida</title>
    <!-- Vi använder Tailwind CSS för designen -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation för att sidan ska laddas mjukt */
        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* En anpassad guld-gradient för rubriker */
        .gold-text {
            background: linear-gradient(to right, #b45309, #d97706, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
    </style>
</head>
<body class="bg-white text-zinc-800 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white border border-amber-100 rounded-3xl shadow-[0_20px_50px_rgba(180,83,9,0.1)] p-8 md:p-12 fade-in">
        <header class="text-center mb-12">
            <h1 class="text-5xl gold-text mb-4">Välkommen</h1>
            <div class="h-0.5 w-16 bg-amber-400 mx-auto mb-6 rounded-full"></div>
            <p class="text-lg text-zinc-500 font-light tracking-wide leading-relaxed">
                På min hemsida kan du se mitt cv och mitt gymnasiearbete — det är jag själv som har skapat hemsidan.
            </p>
        </header>

        <nav class="space-y-5">
            <!-- Länk till CV (nu som .html) -->
            <a href="cv.html" class="flex items-center justify-between p-6 border border-amber-100 bg-amber-50/30 rounded-2xl hover:border-amber-400 hover:bg-amber-50 transition-all duration-300 group">
                <div class="flex items-center space-x-5">
                    <div class="bg-white p-3 rounded-xl shadow-sm group-hover:shadow-md transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <div>
                        <span class="block text-xl font-bold text-amber-900 group-hover:text-amber-700 transition-colors">Mitt CV</span>
                        <span class="text-sm text-amber-700/60 font-medium">Läs min meritförteckning direkt på webben</span>
                    </div>
                </div>
                <div class="text-amber-400 group-hover:translate-x-1 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </a>

            <!-- Länk till Gymnasiearbete (nu som .html) -->
            <a href="gymnasiearbete.html" class="flex items-center justify-between p-6 border border-amber-100 bg-amber-50/30 rounded-2xl hover:border-amber-400 hover:bg-amber-50 transition-all duration-300 group">
                <div class="flex items-center space-x-5">
                    <div class="bg-white p-3 rounded-xl shadow-sm group-hover:shadow-md transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div>
                        <span class="block text-xl font-bold text-amber-900 group-hover:text-amber-700 transition-colors">Gymnasiearbete</span>
                        <span class="text-sm text-amber-700/60 font-medium">Läs mitt projektarbete som en websida</span>
                    </div>
                </div>
                <div class="text-amber-400 group-hover:translate-x-1 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </a>
        </nav>

        <footer class="mt-16 text-center text-amber-800/40 text-xs tracking-[0.2em] uppercase font-bold">
            <p>&copy; <span id="year"></span> &bull; Portfölj</p>
        </footer>
    </div>

    <script>
        // Uppdaterar året i footern automatiskt
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
